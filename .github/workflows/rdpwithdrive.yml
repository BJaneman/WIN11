name: Win11Drive
on: workflow_dispatch

jobs:
  summon-pc:
    runs-on: windows-latest

    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Install Rclone and WinFSP (Dependencies)
        run: |
          choco install rclone winfsp -y

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Connect Tailscale
        run: |
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMdd").ToUpper()
          $hostname = "$user-$date"
          $authKey = "tskey-auth-kimGNQPCkz11CNTRL-3fDxcDxBubijSqRCoUw4cidnqU7haxvY"

          & "C:\Program Files\Tailscale\tailscale.exe" up `
            --authkey=$authKey `
            --hostname=$hostname `
            --unattended --reset

      - name: Configure User
        run: |
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          $newUser = New-LocalUser -Name "RDPUser" -Password $Password -FullName "RDP User" -Description "User for RDP"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"

      - name: Mount InfiniCloud WebDAV (Global Desktop)
        run: |
          # 1. Kill any existing instances
          taskkill /IM rclone.exe /F /T | Out-Null

          # 2. Setup Variables
          $pass = "uwWfVg3HNyQ4NE5s"
          $user = "meownsoor"
          $url = "https://otaru.infini-cloud.net/dav/"
          $mountPoint = "C:\Users\Public\Desktop\InfiniCloud"
          
          # Create the folder on the Public Desktop so everyone sees it
          New-Item -ItemType Directory -Force -Path $mountPoint
          
          # Obscure password for rclone
          $obscured = rclone obscure $pass

          # 3. Start the Mount in the background
          # Note: We use --vfs-cache-mode full to ensure Windows Explorer handles it like a real drive
          Start-Process rclone -ArgumentList "mount :webdav: `"$mountPoint`" --webdav-url $url --webdav-user $user --webdav-pass $obscured --vfs-cache-mode full --no-check-certificate" -WindowStyle Hidden
          
          # 4. Give it time to initialize
          Start-Sleep -Seconds 10

      - name: Ready to Connect
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "=========================================="
          echo "SUCCESS! CONNECT TO THIS IP: $tsIP"
          echo "USERNAME: RDPUser"
          echo "PASSWORD: MySecurePass123!"
          echo "INFINICLOUD: Mounted on Public Desktop"
          echo "=========================================="

          # Keeps the runner alive
          while($true) { Start-Sleep -Seconds 60 }
